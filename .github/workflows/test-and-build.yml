name: Test and Build

on:
  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: test-and-build-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint and format checks
        run: |
          npm run lint:check
          npm run format:check

      - name: Create reports directory
        run: mkdir -p reports/jest reports/playwright

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Build application
        run: npm run build-prod

      - name: Get Playwright version
        id: playwright-version
        run: |
          echo "version=$(npm list @playwright/test --depth=0 --json \
            | jq -r '.dependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers and dependencies
        run: |
          npx playwright install-deps
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install
          fi

      - name: Run snapshot tests
        run: npm run test:snapshots

      - name: Upload test reports
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: test-reports
          path: reports/
          retention-days: 7

  report:
    name: Generate Test Reports
    runs-on: ubuntu-latest
    needs: test-and-build
    if: always() && !cancelled()
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write

    steps:
      - name: Generate JEST test report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: test-reports
          name: JEST Tests
          path: "jest/report.xml"
          reporter: jest-junit

      - name: Generate Snapshot test report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: test-reports
          name: Snapshot Tests
          path: "playwright/report.xml"
          reporter: jest-junit
