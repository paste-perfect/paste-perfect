name: CI — Test, Lint & Build

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
  merge_group:
    branches: [main, dev]
  workflow_dispatch:

# Cancel stale runs when a PR receives a new push.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

# No workflow-wide permissions; each job declares its own (least privilege).
permissions: {}

jobs:
  # ── JOB 1: Lint & Format ────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Run ESLint check
        run: npm run lint:check

      - name: Run Prettier format check
        run: npm run format:check

  # ── JOB 2: Lockfile Integrity ───────────────────────────────────────────────
  lockfile-integrity:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --fund=false

      - name: Fail if package-lock.json would change
        run: |
          git diff --exit-code package-lock.json \
            || (echo "::error::package-lock.json is out of sync with package.json"; exit 1)

      - name: Verify full dependency tree resolves
        run: npm ls --all > /dev/null

      - name: Verify dependency provenance signatures
        run: npm audit signatures

      - name: Fail on critical vulnerabilities only
        run: npm audit --audit-level=critical

  # ── JOB 3: Production Build ─────────────────────────────────────────────────
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Build Angular app (production configuration)
        run: npm run build-prod

  # ── JOB 4: Unit Tests (Vitest) ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Create Vitest reports directory
        run: mkdir -p reports/vitest

      - name: Run Vitest unit tests (CI mode)
        run: npm run test:unit:ci

      - name: Upload Vitest report artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: test-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 5: Snapshot Tests (Playwright in Docker) ────────────────────────────
  snapshots:
    name: Snapshot Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run Playwright snapshot tests (Docker)
        run: npm run test:snapshots:ci

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: snapshot-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 6: Publish Test Reports ─────────────────────────────────────────────
  report:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [test, snapshots]
    if: ${{ always() && !cancelled() }}
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Publish Vitest unit test report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: test-reports-${{ github.run_id }}
          name: Vitest Unit Tests
          path: "vitest/report.xml"
          reporter: jest-junit
          fail-on-error: false

      - name: Publish Playwright snapshot test report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: snapshot-reports-${{ github.run_id }}
          name: Playwright Snapshot Tests
          path: "playwright/report.xml"
          reporter: jest-junit
          fail-on-error: false
