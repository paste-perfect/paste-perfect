name: CI — Test, Lint & Build

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
  merge_group:
    branches: [main, dev]
  workflow_dispatch:

# Cancel stale runs when a PR receives a new push.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: {} # declared per-job

jobs:

  # ── JOB 1: Lint & Format ────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'merge_group' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      # Always run npm ci — this is the only step that catches lockfile/
      # package.json drift (ERESOLVE). setup-node already caches ~/.npm,
      # so install is still fast; we just no longer cache node_modules
      # because doing so let us skip npm ci and merge a broken lockfile.
      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Lint
        run: npm run lint:check

      - name: Format check
        run: npm run format:check

  # ── JOB 2: Lockfile Integrity ───────────────────────────────────────────────
  # Dedicated gate that would have blocked the broken Renovate PR:
  # fails if package-lock.json is out of sync, peer deps don't resolve,
  # or provenance signatures are invalid. Mark this as a REQUIRED status
  # check in branch protection for `main` and `dev`.
  lockfile-integrity:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --fund=false

      - name: Fail if package-lock.json would change
        run: |
          git diff --exit-code package-lock.json \
            || (echo "::error::package-lock.json is out of sync with package.json"; exit 1)

      - name: Verify full dependency tree resolves
        run: npm ls --all > /dev/null

      - name: Verify dependency provenance signatures
        run: npm audit signatures

      - name: Fail on critical vulnerabilities only
        run: npm audit --audit-level=critical

  # ── JOB 3: Unit Tests + Build ───────────────────────────────────────────────
  # Runs after lint passes. Downstream jobs depend on this transitively.
  test-build:
    name: Unit Tests & Build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Create reports directory
        run: mkdir -p reports/jest reports/playwright

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Build Angular app (production)
        run: npm run build-prod

      - name: Upload test artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: test-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 4: Playwright Snapshot Tests ────────────────────────────────────────
  snapshots:
    name: Snapshot Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Resolve Playwright version
        id: pw-version
        run: |
          echo "version=$(npm list @playwright/test --depth=0 --json \
            | jq -r '.dependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright system dependencies
        run: npx playwright install-deps

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install

      - name: Create reports directory
        run: mkdir -p reports/playwright

      - name: Run snapshot tests
        run: npm run test:snapshots

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: snapshot-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 5: Publish Test Reports (fan-in) ────────────────────────────────────
  # Runs even on upstream failure to publish results, but skips when upstream
  # jobs were skipped (e.g. draft-PR guard) to avoid "no artifact found" errors.
  report:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [test-build, snapshots]
    if: >
      always() &&
      !cancelled() &&
      !contains(needs.*.result, 'skipped')
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write

    steps:
      - name: Generate Jest report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: test-reports-${{ github.run_id }}
          name: Jest Unit Tests
          path: "jest/report.xml"
          reporter: jest-junit
          fail-on-error: false

      - name: Generate Playwright report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: snapshot-reports-${{ github.run_id }}
          name: Playwright Snapshot Tests
          path: "playwright/report.xml"
          reporter: jest-junit
          fail-on-error: false
