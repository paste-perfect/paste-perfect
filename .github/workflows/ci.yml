name: CI — Test, Lint & Build

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
  merge_group:
    branches: [main, dev]
  workflow_dispatch:

# Cancel stale runs when a PR receives a new push.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nm-${{ runner.os }}-
      - if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run lint:check
      - run: npm run format:check

  # Unit tests + production build — runs natively on the runner (no Docker needed).
  test-build:
    name: Unit Tests & Build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        id: nm-cache
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nm-${{ runner.os }}-
      - if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci
      - run: mkdir -p reports/vitest reports/playwright
      - run: npm run test:unit:ci
      - run: npm run build-prod
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: test-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # Snapshot tests run inside the Playwright Docker image to guarantee
  # pixel-identical rendering across local machines and CI.
  snapshots:
    name: Snapshot Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - run: npm run test:snapshots:ci
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: snapshot-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # Fan-in: publishes JUnit results as PR checks. Skipped if upstream was skipped.
  report:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [test-build, snapshots]
    if: >
      always() &&
      !cancelled() &&
      !contains(needs.*.result, 'skipped')
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    steps:
      - name: Vitest report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: test-reports-${{ github.run_id }}
          name: Vitest Unit Tests
          path: "vitest/report.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Playwright report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: snapshot-reports-${{ github.run_id }}
          name: Playwright Snapshot Tests
          path: "playwright/report.xml"
          reporter: java-junit
          fail-on-error: false
