name: CI — Test, Lint & Build

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
  # Post-merge safety net: dev runs with strict:false (no required up-to-date / no merge
  # queue), so a PR can land slightly behind dev. This validates the *merged* result.
  push:
    branches: [dev]
  workflow_dispatch:

# Cancel stale PR runs on new pushes. For push (the dev post-merge build) and dispatch,
# group by ref so a newer commit supersedes an in-flight run.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# No workflow-wide permissions; each job declares its own (least privilege).
permissions: {}

jobs:

  # ── JOB 1: PR Title Lint (PR events only) ───────────────────────────────────
  # Enforces Conventional Commit format so titles are parseable by semantic-release
  # and the lifecycle guards. Runs only on pull_request — skipped on the push: dev
  # post-merge build and workflow_dispatch, where title validation is meaningless.
  pr-title:
    name: Lint PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read

    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.{1,100}$
          subjectPatternError: "PR title subject must be between 1 and 100 characters"

  # ── JOB 2: Lint & Format ────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Run ESLint check
        run: npm run lint:check

      - name: Run Prettier format check
        run: npm run format:check

  # ── JOB 3: Lockfile Integrity ───────────────────────────────────────────────
  lockfile-integrity:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --fund=false

      - name: Fail if package-lock.json would change
        run: |
          git diff --exit-code package-lock.json \
            || (echo "::error::package-lock.json is out of sync with package.json"; exit 1)

      - name: Verify full dependency tree resolves
        run: npm ls --all > /dev/null

      - name: Verify dependency provenance signatures
        run: npm audit signatures

      - name: Fail on critical vulnerabilities only
        run: npm audit --audit-level=critical

  # ── JOB 4: Production Build ─────────────────────────────────────────────────
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    needs: [lint, lockfile-integrity]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Build Angular app (production configuration)
        run: npm run build-prod

  # ── JOB 5: Unit Tests (Vitest) ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, lockfile-integrity]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Create Vitest reports directory
        run: mkdir -p reports/vitest

      - name: Run Vitest unit tests (CI mode)
        run: npm run test:unit:ci

      - name: Upload Vitest report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 6: Snapshot Tests (Playwright in Docker) ────────────────────────────
  snapshots:
    name: Snapshot Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint, lockfile-integrity]
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Playwright snapshot tests (Docker)
        run: npm run test:snapshots:ci

      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: snapshot-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 7: Publish Test Reports ─────────────────────────────────────────────
  # Runs after both test jobs regardless of their outcome so failures are always
  # surfaced in the PR checks UI.
  report:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [test, snapshots]
    if: ${{ always() && !cancelled() }}
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Publish Vitest unit test report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637 # v2.5.0
        with:
          artifact: test-reports-${{ github.run_id }}
          name: Vitest Unit Tests
          path: "vitest/report.xml"
          reporter: jest-junit
          fail-on-error: false

      - name: Publish Playwright snapshot test report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637 # v2.5.0
        with:
          artifact: snapshot-reports-${{ github.run_id }}
          name: Playwright Snapshot Tests
          path: "playwright/report.xml"
          reporter: jest-junit
          fail-on-error: false
