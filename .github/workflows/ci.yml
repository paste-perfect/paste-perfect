name: CI — Test, Lint & Build

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
  merge_group:
    branches: [main, dev]
  workflow_dispatch:

# Cancel stale runs when a PR receives a new push.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions: {} # declared per-job

jobs:
  # ── JOB 1: Lint & Format ────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Lint
        run: npm run lint:check

      - name: Format check
        run: npm run format:check

  # ── JOB 2: Lockfile Integrity ───────────────────────────────────────────────
  lockfile-integrity:
    name: Lockfile Integrity
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --fund=false

      - name: Fail if package-lock.json would change
        run: |
          git diff --exit-code package-lock.json \
            || (echo "::error::package-lock.json is out of sync with package.json"; exit 1)

      - name: Verify full dependency tree resolves
        run: npm ls --all > /dev/null

      - name: Verify dependency provenance signatures
        run: npm audit signatures

      - name: Fail on critical vulnerabilities only
        run: npm audit --audit-level=critical

    # ── JOB 3: Build ───────────────────────────────────────────────
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"
      - run: npm ci --no-audit --fund=false
      - run: npm run build-prod

  # ── JOB 3: Unit Tests ───────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Create reports directory
        run: mkdir -p reports/vitest

      - name: Run unit tests
        run: npm run test:unit:ci

      - name: Upload test artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: test-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 4: Playwright Snapshot Tests ────────────────────────────────────────
  snapshots:
    name: Snapshot Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run snapshot tests (Docker)
        run: npm run test:snapshots:ci

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() }}
        with:
          name: snapshot-reports-${{ github.run_id }}
          path: reports/
          retention-days: 7

  # ── JOB 5: Publish Test Reports ────────────────────────────────────
  report:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [test, snapshots]
    if: >
      always() &&
      !cancelled() &&
      !contains(needs.*.result, 'skipped')
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Generate Vitest report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: test-reports-${{ github.run_id }}
          name: Vitest Unit Tests
          path: "vitest/report.xml"
          reporter: jest-junit
          fail-on-error: false

      - name: Generate Playwright report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637
        with:
          artifact: snapshot-reports-${{ github.run_id }}
          name: Playwright Snapshot Tests
          path: "playwright/report.xml"
          reporter: jest-junit
          fail-on-error: false
