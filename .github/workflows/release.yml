name: Release (Semantic Release)

on:
  push:
    branches: [main, dev]

# Never cancel an in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {} # declared at job level

jobs:

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Guard against infinite loop: semantic-release pushes a version-bump commit
    # back to the branch after creating a GitHub Release. This filter also covers
    # sync/promote automation commits for the same reason.
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.head_commit.message, 'chore(sync):') &&
      !startsWith(github.event.head_commit.message, 'chore(promote):]')
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          # App token is required so the version-bump push triggers downstream
          # workflows (GITHUB_TOKEN pushes intentionally do not re-trigger them).
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Verify dependency provenance signatures
        run: npm audit signatures

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release
