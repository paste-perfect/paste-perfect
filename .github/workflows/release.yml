# .github/workflows/release.yml
name: Release — Semantic Release & Promote

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # ── JOB 1: Semantic Release ──────────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.head_commit.message, 'chore(sync):') &&
      !(
        github.ref == 'refs/heads/dev' &&
        (github.actor == 'releasebot[bot]' || github.actor == 'semantic-release-bot')
      )
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies (strict)
        run: npm ci --no-audit --fund=false

      - name: Verify dependency provenance signatures
        run: npm audit signatures

      - name: Fail on critical vulnerabilities only
        run: npm audit --audit-level=critical

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npx semantic-release

  # ── JOB 2: Promote dev → main ───────────────────────────────────────────────
  promote:
    name: Ensure dev → main Release PR
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: write       # Requires contents:write to push the staging branch
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout (full history for divergence check)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Ensure release PR exists and labels are current
        uses: ./.github/actions/release-pr
        with:
          token: ${{ steps.app-token.outputs.token }}
