name: Deploy — GitHub Pages

on:
  release:
    types: [prereleased, published]

# Never cancel an active deployment mid-flight — partial deploys are dangerous.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions: {} # declared per-job

jobs:

  # ── JOB 1: Build Angular ─────────────────────────────────────────────────────
  # Separated from deploy so the build artifact is independently auditable.
  build:
    name: Build Angular (${{ github.event.release.prerelease && 'Preview' || 'Production' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      # ── dev pre-release → preview build ───────────────────────────────────
      - name: Build (Preview / Dev environment)
        if: github.event.release.prerelease == true
        run: npm run build-preview

      # ── main release → production build ───────────────────────────────────
      - name: Build (Production environment)
        if: github.event.release.prerelease == false
        run: npm run build-prod

      - name: Upload build artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: angular-dist-${{ github.run_id }}
          path: dist/paste-perfect/browser
          retention-days: 1

  # ── JOB 2a: Deploy Preview ───────────────────────────────────────────────────
  deploy-preview:
    name: Deploy → Preview (Dev environment)
    runs-on: ubuntu-latest
    needs: build
    if: github.event.release.prerelease == true
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: angular-dist-${{ github.run_id }}
          path: dist/paste-perfect/browser

      - name: Deploy to GitHub Pages (Preview)
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          repository-name: paste-perfect/paste-perfect-test
          branch: gh-pages
          folder: dist/paste-perfect/browser
          clean: true
          ssh-key: ${{ secrets.DEPLOY_KEY_PREVIEW }}

  # ── JOB 2b: Deploy Production ────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event.release.prerelease == false
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: angular-dist-${{ github.run_id }}
          path: dist/paste-perfect/browser

      - name: Deploy to GitHub Pages (Production)
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          branch: gh-pages
          folder: dist/paste-perfect/browser
          clean: true
