name: Deploy App

on:
  release:
    types:
      - prereleased
      - released
      - published
      - created

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # Never cancel an active deployment mid-flight

jobs:
  deploy:
    name: Deploy to GitHub Pages (${{ github.ref_name }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── dev → preview environment ──────────────────────────────────────────
      - name: Build Angular app (Dev / Preview)
        if: github.event.release.prerelease == true
        run: npm run build-preview

      - name: Deploy to GitHub Pages (Dev environment)
        if: github.event.release.prerelease == true
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          repository-name: paste-perfect/paste-perfect-test
          branch: gh-pages
          folder: dist/paste-perfect/browser
          clean: true
          ssh-key: ${{ secrets.DEPLOY_KEY_NEU }}

      # ── main → production environment ─────────────────────────────────────
      - name: Build Angular app (Production)
        if: github.event.release.prerelease == false
        run: npm run build-prod

      - name: Deploy to GitHub Pages (Production)
        if: github.event.release.prerelease == false
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          branch: gh-pages
          folder: dist/paste-perfect/browser
          clean: true
