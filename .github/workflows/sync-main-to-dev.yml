name: Sync main → dev (Staging Merge)

on:
  push:
    branches: [main]
    # Only trigger when source files actually changed — skip pure tag pushes
    paths-ignore:
      - "**.md"
      - ".github/CODEOWNERS"
  workflow_dispatch:

# ── Only one sync can run at a time; cancel in-flight stale syncs ────────────
concurrency:
  group: sync-main-to-dev
  cancel-in-progress: true

permissions: {} # all permissions declared per-job

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 1 — Merge main into a staging branch & resolve version conflicts
  # ────────────────────────────────────────────────────────────────────────────
  staging-merge:
    name: "Staging Merge: main → automation/main-to-dev-sync"
    runs-on: ubuntu-latest
    # ── Guard: skip semantic-release version-bump commits to prevent loops ───
    # semantic-release pushes "chore(release): <version>" back to main after a
    # release. Without this guard that push would kick off a redundant sync.
    # Sync commits themselves are also filtered to prevent re-entrancy.
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.head_commit.message, 'chore(sync):')
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_changes: ${{ steps.merge.outputs.has_changes }}
      sync_branch: ${{ steps.merge.outputs.sync_branch }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout (full history for merge base resolution)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git identity
        run: |
          git config user.name  "releasebot[bot]"
          git config user.email "releasebot[bot]@users.noreply.github.com"

      # ── Core Staging Merge + False-Conflict Resolution Script ─────────────
      - name: Perform staging merge & resolve version conflicts
        id: merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          git fetch origin main dev

          # ── Divergence check ──────────────────────────────────────────
          AHEAD=$(git rev-list --right-only --count origin/dev...origin/main)
          if [ "$AHEAD" -eq 0 ]; then
            echo "✅ dev is already up to date with main. Nothing to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SYNC_BRANCH="automation/main-to-dev-sync"

          # ── Create staging branch off current dev tip ──────────────────
          git checkout -B "$SYNC_BRANCH" origin/dev

          # ── Attempt clean merge of main into staging branch ────────────
          set +e
          git merge --no-ff --no-edit origin/main \
            -m "chore(sync): merge main into dev [skip ci]"
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -ne 0 ]; then
            # ── Conflict Analysis ─────────────────────────────────────
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "⚠️  Conflicts detected in:"
            echo "$CONFLICTS"

            # VERSION_FILES: package.json & lockfiles only
            VERSION_FILES_PATTERN='^(package\.json|package-lock\.json|npm-shrinkwrap\.json)$'

            # Any conflict outside version files → HARD FAIL (real conflict)
            NON_VERSION=$(echo "$CONFLICTS" \
              | grep -vE "$VERSION_FILES_PATTERN" || true)

            if [ -n "$NON_VERSION" ]; then
              echo "❌ Real (non-version) conflicts detected — manual resolution required:"
              echo "$NON_VERSION"
              exit 1
            fi

            echo "🔍 Conflicts limited to version/lockfiles — applying False-Conflict resolution..."

            # ── False-Conflict Resolution ─────────────────────────────
            # Strategy: --ours (dev's RC/pre-release version wins)
            # Rationale: semantic-release manages version bumps on main;
            # dev carries RC suffixes (e.g. 1.2.0-rc.1). We preserve
            # dev's pre-release version to avoid semantic-release
            # desync on the next release cycle.
            for f in package.json package-lock.json npm-shrinkwrap.json; do
              if echo "$CONFLICTS" | grep -qx "$f"; then
                echo "  → Resolving '$f' with --ours (dev's RC version preserved)"
                git checkout --ours "$f"
                git add "$f"
              fi
            done

            git commit \
              -m "chore(sync): resolve version false-conflict — preserve dev RC version [skip ci]"

            echo "✅ False-conflict resolved. Dev's pre-release version retained."
          fi

          # ── Tree-level guard: verify merged result actually differs from dev ──
          # A commit-count check (origin/dev..HEAD) is insufficient — the merge
          # commit itself always makes HEAD appear "ahead" even when main's changes
          # were already cherry-picked into dev, making the tree identical.
          # GitHub rejects PR creation with "No commits between dev and <branch>"
          # in that case. A tree diff is the only reliable signal.
          DIFF_COUNT=$(git diff --name-only origin/dev HEAD | wc -l)
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "✅ Merged tree is identical to dev tip — no effective changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push --force-with-lease origin "$SYNC_BRANCH"

          echo "has_changes=true"         >> "$GITHUB_OUTPUT"
          echo "sync_branch=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 2 — Validation Gate: build & test the MERGED state
  # The PR is only opened (and auto-merge enabled) after this gate is green.
  # ────────────────────────────────────────────────────────────────────────────
  validate-merge:
    name: "Validation Gate: Build & Test Merged State"
    runs-on: ubuntu-latest
    needs: staging-merge
    if: needs.staging-merge.outputs.has_changes == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout staging branch (merged state)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.staging-merge.outputs.sync_branch }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      # Tier-1: node_modules cache
      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run unit tests on merged state
        run: npm run test:unit:ci

      - name: Build Angular app on merged state
        run: npm run build-prod

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 3 — Open PR and enable auto-merge (only if validation passed)
  # ────────────────────────────────────────────────────────────────────────────
  open-sync-pr:
    name: Open Sync PR → dev
    runs-on: ubuntu-latest
    needs: [staging-merge, validate-merge]
    # ALWAYS run if staging-merge succeeded and produced changes,
    # even if validate-merge failed.
    if: always() && needs.staging-merge.result == 'success' && needs.staging-merge.outputs.has_changes == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout (for git commands in re-verification)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create or reuse sync PR
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNC_BRANCH: ${{ needs.staging-merge.outputs.sync_branch }}
        run: |
          set -euo pipefail

          # ── Re-verify the sync branch still has real file changes vs dev ──
          # IMPORTANT: commit count is NOT sufficient here — the merge commit
          # itself always makes the branch appear "ahead" even when the merged
          # tree is identical to dev (e.g. all main commits were already
          # cherry-picked into dev). GitHub rejects gh pr create with
          # "No commits between dev and <branch>" in that case.
          # A tree diff is the only reliable signal.
          git fetch origin dev "$SYNC_BRANCH"
          DIFF_COUNT=$(git diff --name-only origin/dev origin/"$SYNC_BRANCH" | wc -l)
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "✅ Sync branch tree is identical to dev (race condition or cherry-pick overlap). Skipping PR creation."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(gh pr list \
            --base dev \
            --head "$SYNC_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            gh pr create \
              --base dev \
              --head "$SYNC_BRANCH" \
              --title "chore(sync): merge main into dev" \
              --body "$(cat <<'EOF'
          ## Automated Post-Release Sync: main → dev

          This PR was created by the **Staging Merge** workflow after a push to `main`.

          ### What happened?
          1. A staging branch (`automation/main-to-dev-sync`) was created from `dev`.
          2. `main` was merged into it.
          3. Version false-conflicts in `package.json` / `package-lock.json` were auto-resolved — **dev's RC/pre-release version is preserved**.

          _If the Validation Gate pipeline failed, auto-merge will be disabled so you can inspect the failure manually._
          EOF
          )"

            PR_NUMBER=$(gh pr list \
              --base dev \
              --head "$SYNC_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number')
          else
            echo "ℹ️  Reusing existing sync PR #$PR_NUMBER"
          fi

          echo "pr_number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        # ONLY enable auto-merge if the validation gate actually passed
        if: needs.validate-merge.result == 'success' && steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --auto \
            --merge \
            --delete-branch \
            || echo "ℹ️  Auto-merge already enabled or PR already merged."
