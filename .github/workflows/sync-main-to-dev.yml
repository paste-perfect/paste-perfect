name: Sync main → dev (Staging Merge)

on:
  push:
    branches: [main]
    # Only trigger when source files actually changed — skip pure tag pushes
    paths-ignore:
      - "**.md"
      - ".github/CODEOWNERS"
  workflow_dispatch:

# Only one sync at a time; cancel stale in-flight syncs.
concurrency:
  group: sync-main-to-dev
  cancel-in-progress: true

permissions: {} # all permissions declared per-job

jobs:

  # ── STAGE 1: Merge main into staging branch & resolve version conflicts ──────
  staging-merge:
    name: "Staging Merge: main → automation/main-to-dev-sync"
    runs-on: ubuntu-latest
    # Skip semantic-release version-bump and sync commits to prevent re-entrancy.
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.head_commit.message, 'chore(sync):]')
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_changes: ${{ steps.merge.outputs.has_changes }}
      sync_branch: ${{ steps.merge.outputs.sync_branch }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout (full history for merge base resolution)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git identity
        run: |
          git config user.name  "releasebot[bot]"
          git config user.email "releasebot[bot]@users.noreply.github.com"

      - name: Perform staging merge & resolve version conflicts
        id: merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          git fetch origin main dev

          AHEAD=$(git rev-list --right-only --count origin/dev...origin/main)
          if [ "$AHEAD" -eq 0 ]; then
            echo "dev is already up to date with main. Nothing to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SYNC_BRANCH="automation/main-to-dev-sync"

          git checkout -B "$SYNC_BRANCH" origin/dev

          set +e
          git merge --no-ff --no-edit origin/main \
            -m "chore(sync): merge main into dev [skip ci]"
          MERGE_EXIT=$?
          set -e

          if [ $MERGE_EXIT -ne 0 ]; then
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            echo "Conflicts detected in:"
            echo "$CONFLICTS"

            VERSION_FILES_PATTERN='^(package\.json|package-lock\.json|npm-shrinkwrap\.json)$'
            NON_VERSION=$(echo "$CONFLICTS" | grep -vE "$VERSION_FILES_PATTERN" || true)

            if [ -n "$NON_VERSION" ]; then
              echo "Real (non-version) conflicts detected — manual resolution required:"
              echo "$NON_VERSION"
              exit 1
            fi

            echo "Conflicts limited to version/lockfiles — applying false-conflict resolution."

            # Strategy: --ours (dev's RC/pre-release version wins).
            # Rationale: dev carries RC suffixes (e.g. 1.2.0-rc.1). Preserving
            # dev's version prevents semantic-release desync on the next release.
            for f in package.json package-lock.json npm-shrinkwrap.json; do
              if echo "$CONFLICTS" | grep -qx "$f"; then
                echo "  → Resolving '$f' with --ours (dev RC version preserved)"
                git checkout --ours "$f"
                git add "$f"
              fi
            done

            git commit \
              -m "chore(sync): resolve version false-conflict — preserve dev RC version [skip ci]"

            echo "False-conflict resolved. Dev's pre-release version retained."
          fi

          # Tree diff is the reliable signal — commit count alone is insufficient
          # because the merge commit itself makes HEAD appear "ahead" even when
          # the resulting tree is identical to dev (e.g. cherry-picked commits).
          DIFF_COUNT=$(git diff --name-only origin/dev HEAD | wc -l)
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "Merged tree is identical to dev tip — no effective changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push --force-with-lease origin "$SYNC_BRANCH"

          echo "has_changes=true"         >> "$GITHUB_OUTPUT"
          echo "sync_branch=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"

  # ── STAGE 2: Validate the merged state before opening a PR ──────────────────
  validate-merge:
    name: "Validation Gate: Build & Test Merged State"
    runs-on: ubuntu-latest
    needs: staging-merge
    if: needs.staging-merge.outputs.has_changes == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout staging branch (merged state)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.staging-merge.outputs.sync_branch }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Restore node_modules cache
        id: nm-cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: nm-${{ runner.os }}-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run unit tests on merged state
        run: npm run test:unit:ci

      - name: Build Angular app on merged state
        run: npm run build-prod

  # ── STAGE 3: Open sync PR and enable auto-merge if validation passed ─────────
  open-sync-pr:
    name: Open Sync PR → dev
    runs-on: ubuntu-latest
    needs: [staging-merge, validate-merge]
    # Always run if staging-merge succeeded with changes — even if validate-merge
    # failed — so the PR is still created for manual inspection.
    if: always() && needs.staging-merge.result == 'success' && needs.staging-merge.outputs.has_changes == 'true'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout (for git commands in re-verification)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Create or reuse sync PR
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNC_BRANCH: ${{ needs.staging-merge.outputs.sync_branch }}
        run: |
          set -euo pipefail

          # Re-verify via tree diff — commit count is unreliable (see staging-merge).
          git fetch origin dev "$SYNC_BRANCH"
          DIFF_COUNT=$(git diff --name-only origin/dev origin/"$SYNC_BRANCH" | wc -l)
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "Sync branch tree is identical to dev (race condition or cherry-pick overlap). Skipping PR creation."
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PR_NUMBER=$(gh pr list \
            --base dev \
            --head "$SYNC_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            gh pr create \
              --base dev \
              --head "$SYNC_BRANCH" \
              --title "chore(sync): merge main into dev" \
              --body "$(cat <<'EOF'
          ## Automated Post-Release Sync: main → dev

          This PR was created by the **Staging Merge** workflow after a push to \`main\`.

          ### What happened?
          1. A staging branch (\`automation/main-to-dev-sync\`) was created from \`dev\`.
          2. \`main\` was merged into it.
          3. Version false-conflicts in \`package.json\` / \`package-lock.json\` were auto-resolved — **dev's RC/pre-release version is preserved**.

          _If the Validation Gate pipeline failed, auto-merge will be disabled so you can inspect the failure manually._
          EOF
          )"

            PR_NUMBER=$(gh pr list \
              --base dev \
              --head "$SYNC_BRANCH" \
              --state open \
              --json number \
              --jq '.[0].number')
          else
            echo "Reusing existing sync PR #$PR_NUMBER"
          fi

          echo "pr_number=${PR_NUMBER:-}" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: needs.validate-merge.result == 'success' && steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --auto \
            --merge \
            --delete-branch \
            || echo "Auto-merge already enabled or PR already merged."
