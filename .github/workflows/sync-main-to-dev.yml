# .github/workflows/sync-main-to-dev.yml
name: Sync main → dev (Staging Merge)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sync-main-to-dev
  cancel-in-progress: false

permissions: {}

jobs:
  # ── STAGE 1: Merge main into staging branch & resolve version conflicts ──────
  staging-merge:
    name: "Staging Merge: main → automation/main-to-dev-sync"
    runs-on: ubuntu-latest
    if: >
      !startsWith(github.event.head_commit.message, 'chore(release):') &&
      !startsWith(github.event.head_commit.message, 'chore(sync):')
    permissions:
      contents: write
      pull-requests: write
    outputs:
      has_changes: ${{ steps.merge.outputs.has_changes }}
      sync_branch: ${{ steps.merge.outputs.sync_branch }}
      has_conflicts: ${{ steps.merge.outputs.has_conflicts }}
      conflict_files: ${{ steps.merge.outputs.conflict_files }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure Git identity
        run: |
          git config user.name  "releasebot[bot]"
          git config user.email "releasebot[bot]@users.noreply.github.com"

      - name: Perform staging merge & resolve version conflicts
        id: merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          SYNC_BRANCH="automation/main-to-dev-sync"

          git fetch origin main dev
          git fetch origin "$SYNC_BRANCH" 2>/dev/null || true

          AHEAD=$(git rev-list --right-only --count origin/dev...origin/main)
          if [ "$AHEAD" -eq 0 ]; then
            echo "dev is already up to date with main. Nothing to sync."
            echo "has_changes=false"        >> "$GITHUB_OUTPUT"
            echo "has_conflicts=false"      >> "$GITHUB_OUTPUT"
            echo "conflict_files="          >> "$GITHUB_OUTPUT"
            echo "sync_branch=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -B "$SYNC_BRANCH" origin/dev

          set +e
          git merge --no-ff --no-edit origin/main \
            -m "chore(sync): merge main into dev"
          MERGE_EXIT=$?
          set -e

          HAS_REAL_CONFLICTS=false
          CONFLICT_FILES_LIST=""

          if [ $MERGE_EXIT -ne 0 ]; then
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            VERSION_FILES_PATTERN='^(package\.json|package-lock\.json|npm-shrinkwrap\.json)$'
            VERSION_CONFLICTS=$(echo "$CONFLICTS"     | grep -E  "$VERSION_FILES_PATTERN" | grep -v '^$' || true)
            NON_VERSION_CONFLICTS=$(echo "$CONFLICTS" | grep -vE "$VERSION_FILES_PATTERN" | grep -v '^$' || true)

            # Sync flow (main->dev): Keep DEV's version (--ours) to preserve RC suffix
            for f in package.json package-lock.json npm-shrinkwrap.json; do
              if echo "$VERSION_CONFLICTS" | grep -qx "$f"; then
                git checkout --ours -- "$f"
                git add "$f"
              fi
            done

            PKG_CONFLICTED=false;  echo "$VERSION_CONFLICTS" | grep -qx "package.json"      && PKG_CONFLICTED=true
            LOCK_CONFLICTED=false; echo "$VERSION_CONFLICTS" | grep -qx "package-lock.json" && LOCK_CONFLICTED=true
            if [ "$PKG_CONFLICTED" = "true" ] && [ "$LOCK_CONFLICTED" = "false" ] && [ -f package-lock.json ]; then
              git checkout HEAD -- package-lock.json
              git add package-lock.json
            elif [ "$LOCK_CONFLICTED" = "true" ] && [ "$PKG_CONFLICTED" = "false" ]; then
              git checkout HEAD -- package.json
              git add package.json
            fi

            if [ -n "$NON_VERSION_CONFLICTS" ]; then
              echo "::warning::Real conflicts — aborting for manual resolution"
              HAS_REAL_CONFLICTS=true
              CONFLICT_FILES_LIST=$(echo "$NON_VERSION_CONFLICTS" | tr '\n' ',' | sed 's/,$//')

              git merge --abort || true
              git checkout -B "$SYNC_BRANCH" origin/dev
              git push --force origin "$SYNC_BRANCH" || true

              echo "has_changes=true"                    >> "$GITHUB_OUTPUT"
              echo "sync_branch=$SYNC_BRANCH"            >> "$GITHUB_OUTPUT"
              echo "has_conflicts=$HAS_REAL_CONFLICTS"   >> "$GITHUB_OUTPUT"
              echo "conflict_files=$CONFLICT_FILES_LIST" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git commit -m "chore(sync): resolve version false-conflict — preserve dev RC version"
          fi

          DIFF_COUNT=$(git diff --name-only origin/dev HEAD | wc -l | tr -d ' ')
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "Merged tree identical to dev — nothing to sync."
            echo "has_changes=false"        >> "$GITHUB_OUTPUT"
            echo "has_conflicts=false"      >> "$GITHUB_OUTPUT"
            echo "sync_branch=$SYNC_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push --force origin "$SYNC_BRANCH"

          echo "has_changes=true"                    >> "$GITHUB_OUTPUT"
          echo "sync_branch=$SYNC_BRANCH"            >> "$GITHUB_OUTPUT"
          echo "has_conflicts=$HAS_REAL_CONFLICTS"   >> "$GITHUB_OUTPUT"
          echo "conflict_files=$CONFLICT_FILES_LIST" >> "$GITHUB_OUTPUT"

  # ── STAGE 2: Validate the merged state before opening a PR ──────────────────
  validate-merge:
    name: "Validation Gate: Build & Test Merged State"
    runs-on: ubuntu-latest
    needs: staging-merge
    if: >
      needs.staging-merge.outputs.has_changes == 'true' &&
      needs.staging-merge.outputs.has_conflicts == 'false'
    permissions:
      contents: read

    steps:
      - name: Checkout staging branch (merged state)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.staging-merge.outputs.sync_branch }}
          fetch-depth: 0

      - name: Detect change scope
        id: scope
        run: |
          set -euo pipefail
          git fetch origin dev
          CHANGED=$(git diff --name-only origin/dev HEAD)
          NON_DOC=$(echo "$CHANGED" \
            | grep -vE '(\.md$|^LICENSE$|^\.github/CODEOWNERS$|^\.editorconfig$|^docs/)' \
            | grep -v '^$' || true)

          if [ -z "$NON_DOC" ]; then
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.scope.outputs.code_changed == 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        if: steps.scope.outputs.code_changed == 'true'
        run: npm ci --no-audit --fund=false

      - name: Verify lockfile is in sync
        if: steps.scope.outputs.code_changed == 'true'
        run: |
          git diff --exit-code package-lock.json \
            || (echo "::error::package-lock.json drifted after sync merge"; exit 1)

      - name: Run unit tests
        if: steps.scope.outputs.code_changed == 'true'
        run: npm run test:unit:ci

      - name: Build Angular app
        if: steps.scope.outputs.code_changed == 'true'
        run: npm run build-prod

  # ── STAGE 3: Open sync PR and enable auto-merge if validation passed ─────────
  open-sync-pr:
    name: Open Sync PR → dev
    runs-on: ubuntu-latest
    needs: [ staging-merge, validate-merge ]
    if: ${{ !cancelled() && needs.staging-merge.result == 'success' && needs.staging-merge.outputs.has_changes == 'true' }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Build PR body
        env:
          HAS_CONFLICTS: ${{ needs.staging-merge.outputs.has_conflicts }}
          CONFLICT_FILES: ${{ needs.staging-merge.outputs.conflict_files }}
        run: |
          set -euo pipefail

          if [ "$HAS_CONFLICTS" = "true" ]; then
            {
              echo "## ⚠️ Automated Sync: main → dev — MANUAL CONFLICT RESOLUTION REQUIRED"
              echo ""
              echo "The merge was aborted cleanly. The staging branch is parked at the \`dev\` tip."
              echo "Resolve locally and push to unblock:"
              echo ""
              printf '%s' "$CONFLICT_FILES" | tr ',' '\n' | grep -v '^$' | sed 's|.*|- `&`|'
              echo ""
              echo '```bash'
              echo "git fetch origin"
              echo "git checkout automation/main-to-dev-sync"
              echo "git merge origin/main"
              echo "# resolve, then:"
              echo "git add <files> && git commit -m 'fix(sync): resolve merge conflicts' && git push"
              echo '```'
              echo ""
              echo "> _Auto-merge is **disabled** on this PR._"
            } > /tmp/pr_body.md
          else
            {
              echo "## Automated Post-Release Sync: main → dev"
              echo ""
              echo "Staging branch \`automation/main-to-dev-sync\` was created from \`dev\` and \`main\` was merged in."
              echo "Version false-conflicts in \`package.json\` / \`package-lock.json\` were auto-resolved — **dev's RC version is preserved**."
            } > /tmp/pr_body.md
          fi

      - name: Create or reuse sync PR
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNC_BRANCH: ${{ needs.staging-merge.outputs.sync_branch }}
          HAS_CONFLICTS: ${{ needs.staging-merge.outputs.has_conflicts }}
        run: |
          set -euo pipefail

          git fetch origin dev "$SYNC_BRANCH"

          if [ "$HAS_CONFLICTS" != "true" ]; then
            DIFF_COUNT=$(git diff --name-only origin/dev origin/"$SYNC_BRANCH" | wc -l | tr -d ' ')
            COMMIT_AHEAD=$(git rev-list --count origin/dev..origin/"$SYNC_BRANCH")
            if [ "$DIFF_COUNT" -eq 0 ] || [ "$COMMIT_AHEAD" -eq 0 ]; then
              echo "Sync branch has no effective changes vs dev — skipping PR creation."
              echo "pr_number=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          PR_NUMBER=$(gh pr list --base dev --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            TITLE="chore(sync): merge main into dev [skip ci]"
            if [ "$HAS_CONFLICTS" = "true" ]; then
              TITLE="chore(sync): merge main into dev — manual conflict resolution required"
            fi

            if ! gh pr create --base dev --head "$SYNC_BRANCH" --title "$TITLE" --body-file /tmp/pr_body.md 2>/tmp/pr_create_err; then
              if grep -q "No commits between" /tmp/pr_create_err; then
                echo "Race: sync branch already merged. Skipping."
                echo "pr_number=" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              cat /tmp/pr_create_err >&2
              exit 1
            fi

            for i in 1 2 3; do
              PR_NUMBER=$(gh pr list --base dev --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number')
              [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ] && break
              sleep 3
            done
          else
            gh pr edit "$PR_NUMBER" --body-file /tmp/pr_body.md
          fi

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge
        if: >
          needs.staging-merge.outputs.has_conflicts == 'false' &&
          needs.validate-merge.result == 'success' &&
          steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --auto \
            --merge \
            --delete-branch \
            || echo "Auto-merge already enabled or PR already merged."
