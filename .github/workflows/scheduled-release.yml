name: Scheduled Release (dev -> main)

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC (after Renovate's "before 6am" window)
  workflow_dispatch:

concurrency:
  group: scheduled-dev-to-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  scheduled-merge:
    name: Enable auto-merge for lifecycle-only dev -> main PR
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check if dev is ahead of main
        id: ahead
        run: |
          set -euo pipefail
          git fetch origin main dev

          AHEAD=$(git rev-list --right-only --count origin/main...origin/dev)
          if [ "$AHEAD" -eq 0 ]; then
            echo "ℹ️  dev is not ahead of main. Nothing to release."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate all commits are lifecycle-only
        if: steps.ahead.outputs.has_changes == 'true'
        id: validate
        run: |
          set -euo pipefail

          MERGE_BASE=$(git merge-base origin/dev origin/main)
          COMMITS=$(git log "$MERGE_BASE"..origin/dev --pretty=format:"%s")

          echo "Commits to validate:"
          echo "$COMMITS"

          # Allowed: Renovate updates, sync/release automation, merge commits
          LIFECYCLE_PATTERN='^(chore|fix|refactor|build)(\(deps(-dev)?\))?!?: |^chore\(sync\)|^chore\(release\)|^(Merge|merge) '
          NON_LIFECYCLE=$(echo "$COMMITS" | grep -vE "$LIFECYCLE_PATTERN" || true)

          if [ -n "$NON_LIFECYCLE" ]; then
            echo "❌ Non-lifecycle commits detected — skipping auto-merge:"
            echo "$NON_LIFECYCLE"
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "✅ All commits are lifecycle updates."
          echo "should_merge=true" >> "$GITHUB_OUTPUT"

      - name: Find or create dev -> main release PR
        if: steps.validate.outputs.should_merge == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh pr list \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            gh label create "lifecycle-release" \
              --color "5319e7" \
              --description "Automated weekly lifecycle release PR" 2>/dev/null || true

            gh pr create \
              --base main \
              --head dev \
              --title "chore(release): promote dev to main" \
              --label "lifecycle-release" \
              --body "Automated weekly lifecycle merge. All commits validated as lifecycle/dependency updates."

            PR_NUMBER=$(gh pr list \
              --base main \
              --head dev \
              --state open \
              --json number \
              --jq '.[0].number')
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge (merges once CI passes)
        if: steps.validate.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          echo "Enabling auto-merge on PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" \
            --auto \
            --merge \
            --delete-branch=false \
            || echo "ℹ️  Auto-merge already enabled."
          echo "✅ Auto-merge enabled. GitHub will merge once all required checks are green."
