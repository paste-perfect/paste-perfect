name: Scheduled Release (dev → main)

on:
  schedule:
    - cron: "0 8 * * 1" # Every Monday at 08:00 UTC (after Renovate's "before 6am" window)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scheduled-merge:
    name: Merge dev → main (lifecycle-only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_PAT }}

      # ── 1. Guard: dev pipeline must be green ──────────────────────────────
      - name: Verify dev pipeline is green
        id: check-pipeline
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_PAT }}
        run: |
          # Only check the core CI workflows (Test and Build, docker-build)
          STATUS=$(gh api \
            repos/${{ github.repository }}/commits/dev/check-runs \
            --jq '
              [.check_runs[]
                | select(.name | test("Test and Build|docker-build"; "i"))
                | select(.conclusion != null)
              ]
              | if length == 0 then "no_checks"
                elif all(.conclusion == "success" or .conclusion == "skipped") then "green"
                else "failing"
                end')

          echo "Dev pipeline status: $STATUS"

          if [ "$STATUS" != "green" ]; then
            echo "❌ Dev pipeline is not fully green (status=$STATUS). Aborting."
            exit 1
          fi

          echo "✅ Dev pipeline is green."

      # ── 2. Guard: only lifecycle commits since last merge into main ────────
      - name: Check that dev only contains lifecycle commits since last merge
        id: check-commits
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_PAT }}
        run: |
          MERGE_BASE=$(git merge-base origin/dev origin/main)
          echo "Merge base commit: $MERGE_BASE"

          COMMITS=$(git log "$MERGE_BASE"..origin/dev --pretty=format:"%s")
          echo "Commits since last merge to main:"
          echo "$COMMITS"

          if [ -z "$COMMITS" ]; then
            echo "⚠️  No new commits on dev since last merge. Nothing to release."
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Allowed patterns (Renovate + semantic-release sync/release commits + merge commits)
          LIFECYCLE_PATTERN="^(chore|fix|refactor)(\(deps(-dev)?\))?!?: |^chore\(sync\)|^chore\(release\)|^(Merge|merge) "

          NON_LIFECYCLE=$(echo "$COMMITS" | grep -vE "$LIFECYCLE_PATTERN" || true)

          if [ -n "$NON_LIFECYCLE" ]; then
            echo "❌ Non-lifecycle commits found. Will not auto-merge:"
            echo "$NON_LIFECYCLE"
            exit 1
          fi

          echo "✅ All commits are lifecycle updates."
          echo "should_merge=true" >> "$GITHUB_OUTPUT"

      # ── 3. Merge: find or create PR and merge immediately ─────────────────
      - name: Find or create dev → main PR
        if: steps.check-commits.outputs.should_merge == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_PAT }}
        run: |
          EXISTING=$(gh pr list \
            --base main \
            --head dev \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Found existing PR #$EXISTING"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
          else
            echo "Creating dev → main PR..."
            gh pr create \
              --base main \
              --head dev \
              --title "chore(release): scheduled lifecycle merge dev → main" \
              --body "Automated weekly merge. All commits are lifecycle/dependency updates only." \
              --label "dependencies"
            PR_NUMBER=$(gh pr list \
              --base main --head dev --state open \
              --json number --jq '.[0].number')
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge dev → main
        if: steps.check-commits.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_PAT }}
        run: |
          PR_NUMBER=${{ steps.pr.outputs.pr_number }}
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR to merge (was already up to date). Exiting."
            exit 0
          fi
          echo "Merging PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" \
            --merge \
            --delete-branch=false
          echo "✅ dev merged into main via PR #$PR_NUMBER"
