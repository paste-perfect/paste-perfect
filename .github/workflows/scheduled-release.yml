# .github/workflows/scheduled-release.yml
name: Scheduled Release — Weekly Auto-merge (dev → main)

on:
  schedule:
    - cron: "0 0 * * 0" # Every Sunday at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: scheduled-release
  cancel-in-progress: false

permissions: {}

jobs:
  semantic-verify-and-merge:
    name: Semantic Verification + Auto-merge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASEBOT_APP_ID }}
          private-key: ${{ secrets.RELEASEBOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Ensure release PR exists and evaluate lifecycle eligibility
        id: release-pr
        uses: ./.github/actions/release-pr
        with:
          token: ${{ steps.app-token.outputs.token }}

      # Use merge commit (NOT squash) to preserve feat/fix commits for semantic-release
      - name: Enable auto-merge
        if: >
          steps.release-pr.outputs.has_changes == 'true' &&
          steps.release-pr.outputs.is_lifecycle_only == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER="${{ steps.release-pr.outputs.pr_number }}"
          gh pr merge "$PR_NUMBER" \
            --auto \
            --merge \
            --delete-branch \
            || echo "Auto-merge already enabled or PR already merged."
          echo "Auto-merge (merge commit) enabled on PR #$PR_NUMBER."

      - name: Report — no auto-merge (non-lifecycle commits or conflicts present)
        if: >
          steps.release-pr.outputs.has_changes == 'true' &&
          steps.release-pr.outputs.is_lifecycle_only != 'true'
        run: |
          echo "Semantic Verification FAILED — non-lifecycle commits or real conflicts detected."
          echo "Auto-merge aborted. Manual release decision required."

      - name: Report — dev == main
        if: steps.release-pr.outputs.has_changes != 'true'
        run: echo "dev is not ahead of main — nothing to release."
