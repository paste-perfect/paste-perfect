name: Security — Vulnerability Scan (Trivy)

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    branches: [main, dev]
  schedule:
    - cron: "0 4 * * 0" # Every Sunday at 04:00 UTC
  workflow_dispatch:

# Cancel stale runs per PR; use run_id as fallback for scheduled/dispatch runs.
concurrency:
  group: security-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {} # declared per-job

jobs:

  trivy-fs-scan:
    name: Trivy — Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
      actions: read
      checks: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          format: "sarif"
          output: "trivy-results-fs.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2
        if: ${{ !cancelled() && hashFiles('trivy-results-fs.sarif') != '' }}
        with:
          sarif_file: "trivy-results-fs.sarif"

      - name: Upload raw results as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: ${{ !cancelled() && hashFiles('trivy-results-fs.sarif') != '' }}
        with:
          name: trivy-fs-results-${{ github.run_id }}
          path: trivy-results-fs.sarif
          retention-days: 14

