name: docker-build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows:
      - "Test and Build"
    types:
      - completed

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # Only run if the triggering workflow_run succeeded (releases always proceed)
    if: >
      github.event_name == 'release' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # For workflow_run events, check out the exact commit that was tested
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set IMAGE_NAME
        run: echo "IMAGE_NAME=ghcr.io/${REPO,,}" >> $GITHUB_ENV
        env:
          REPO: "${{ github.repository }}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            ${{ env.IMAGE_NAME }}
          # generate Docker tags based on the following events/attributes
          tags: |
            type=schedule,value=latest
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Git commit timestamps
        run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        id: docker-build
        env:
          SOURCE_DATE_EPOCH: ${{ env.TIMESTAMP }}
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (remote — non-PR)
        uses: aquasecurity/trivy-action@0.35.0
        if: github.event_name != 'pull_request'
        env:
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: "${{ env.IMAGE_NAME }}@${{ steps.docker-build.outputs.digest }}"
          format: "sarif"
          output: "trivy-results-docker.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Run Trivy vulnerability scanner (local — PR)
        uses: aquasecurity/trivy-action@0.35.0
        if: github.event_name == 'pull_request'
        with:
          image-ref: "${{ steps.docker-build.outputs.imageid }}"
          format: "sarif"
          output: "trivy-results-docker.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2
        if: always()
        with:
          sarif_file: "trivy-results-docker.sarif"
