name: Docker — Build, Scan & Publish

on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
  merge_group:
    branches: [main, dev]
  release:
    types: [prereleased, published]
  workflow_dispatch:

# Cancel stale runs per PR; use run_id as fallback for other triggers.
concurrency:
  group: docker-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions: {} # declared per-job

jobs:

  docker:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    permissions:
      contents: read
      packages: write        # push to GHCR on release only
      security-events: write # upload Trivy SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Derive IMAGE_NAME (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/${REPO,,}" >> "$GITHUB_ENV"
        env:
          REPO: ${{ github.repository }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' && !github.event.release.prerelease }}

      - name: Set up QEMU (multi-platform support)
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GHCR
        if: github.event_name == 'release'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture Git commit timestamp
        run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Build and conditionally push image
        id: docker-build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        env:
          SOURCE_DATE_EPOCH: ${{ env.TIMESTAMP }}
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'release' }}
          load: ${{ github.event_name != 'release' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ env.IMAGE_NAME }}:ci-scan-${{ github.run_id }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan remote digest on release, local image ID on PR/merge_group.
      # This avoids pulling a just-pushed image back down for PR scans.
      - name: Trivy scan — remote image (release)
        if: github.event_name == 'release'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: "${{ env.IMAGE_NAME }}@${{ steps.docker-build.outputs.digest }}"
          format: "sarif"
          output: "trivy-results-docker.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Trivy scan — local image (PR / merge_group)
        if: github.event_name != 'release'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:ci-scan-${{ github.run_id }}"
          format: "sarif"
          output: "trivy-results-docker.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: ${{ !cancelled() && hashFiles('trivy-results-docker.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2
        with:
          sarif_file: "trivy-results-docker.sarif"

      - name: Upload Trivy results as artifact
        if: ${{ !cancelled() && hashFiles('trivy-results-docker.sarif') != '' }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: trivy-docker-results-${{ github.run_id }}
          path: trivy-results-docker.sarif
          retention-days: 14
