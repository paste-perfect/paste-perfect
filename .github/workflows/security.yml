name: Security — Vulnerability Scan (Trivy)

# Runs on every non-draft PR, a weekly cron for repo-wide visibility, and manually.
# Advisory only — not a required check so a finding never blocks a merge; the team
# decides whether to act on each result.
on:
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 4 * * 0" # Every Sunday at 04:00 UTC
  workflow_dispatch:

# Cancel stale runs per PR; use run_id as fallback for scheduled/dispatch so
# those never cancel each other.
concurrency:
  group: security-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions: {} # declared per-job

jobs:

  trivy-fs-scan:
    name: Trivy — Filesystem Vulnerability Scan
    runs-on: ubuntu-latest
    # Skip draft PRs — only scan when the PR is ready for review.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    permissions:
      contents: read
      security-events: write # upload SARIF to the Security tab

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          format: "sarif"
          output: "trivy-results-fs.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        if: ${{ !cancelled() && hashFiles('trivy-results-fs.sarif') != '' }}
        with:
          sarif_file: "trivy-results-fs.sarif"

      - name: Upload raw results as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: ${{ !cancelled() && hashFiles('trivy-results-fs.sarif') != '' }}
        with:
          name: trivy-fs-results-${{ github.run_id }}
          path: trivy-results-fs.sarif
          retention-days: 14
